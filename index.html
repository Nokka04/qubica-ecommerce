<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="QubicaStore — a black & white storefront built with Vue 3, TypeScript and the Fake Store API."
    />
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/pp-neue-montreal">
    <title>QubicaStore</title>
    <script>
      // Apply the saved (or OS-preferred) theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('qubica-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
